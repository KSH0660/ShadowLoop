<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Shadow Loop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- HOME — YouTube-style browse grid -------------------------------- -->
    <main class="home" id="homeView" aria-label="홈">
      <header class="home-top">
        <p class="wordmark">Shadow<span>Loop</span></p>
        <span class="home-count" id="homeCount"></span>
      </header>
      <nav class="home-filters" id="homeFilters" aria-label="카테고리 필터"></nav>
      <div class="home-feed" id="homeFeed">
        <p class="home-empty" id="homeEmpty">영상을 불러오는 중…</p>
      </div>
    </main>

    <!-- DETAIL — single-focus shadowing player -------------------------- -->
    <main class="app" id="detailView" aria-label="영상 재생" hidden>
      <header class="topbar">
        <button type="button" class="iconbtn" id="backBtn" aria-label="홈으로">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6 6 6" /></svg>
        </button>
        <p class="topbar-title" id="topbarTitle">영상</p>
        <button type="button" class="iconbtn" id="notesBtn" aria-label="저장한 표현" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12a1 1 0 0 1 1 1v15l-7-4-7 4V5a1 1 0 0 1 1-1z" /></svg>
        </button>
        <button type="button" class="iconbtn" id="segBtn" aria-label="구간 목록" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7h12M8 12h12M8 17h12M4 7h.01M4 12h.01M4 17h.01" /></svg>
        </button>
      </header>

      <div class="player-frame">
        <div id="player"></div>
        <div class="empty-player" id="emptyPlayer">
          <span>영상을 불러오는 중…</span>
        </div>
      </div>

      <section class="video-info" aria-label="영상 정보">
        <h1 class="video-title" id="videoTitle">영상을 불러오는 중…</h1>
        <p class="video-sub" id="videoSub"></p>
      </section>

      <section class="stage" aria-label="현재 구간 자막">
        <button type="button" class="peek" id="peekBtn" aria-label="정답 보기 (누르고 있는 동안 전체 표시)">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" /><circle cx="12" cy="12" r="3" /></svg>
        </button>
        <div class="caption" id="caption">
          <p class="caption-empty">자막을 불러오는 중…</p>
        </div>
      </section>

      <section class="glossary" id="glossary" aria-label="어려운 표현" hidden>
        <ul class="gloss-list" id="glossList"></ul>
      </section>

      <div class="cap-actions">
        <button type="button" class="save-seg" id="saveSegBtn" aria-label="이 구간 저장">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12a1 1 0 0 1 1 1v15l-7-4-7 4V5a1 1 0 0 1 1-1z" /></svg>
          <span>저장</span>
        </button>
        <button type="button" class="ai-copy" id="aiPromptBtn" aria-label="AI 학습 프롬프트 복사">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 9h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2z" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></svg>
          <span>AI로 이해하기</span>
        </button>
      </div>

      <section class="controls" aria-label="재생 조절">
        <div class="transport">
          <button type="button" class="step" id="prevSegment" aria-label="이전 구간">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 5v14l-9-7z" /><rect x="5" y="5" width="2" height="14" rx="1" /></svg>
          </button>

          <div class="loop">
            <svg class="loop-ring" viewBox="0 0 120 120" aria-hidden="true">
              <circle class="ring-track" cx="60" cy="60" r="54" />
              <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="54" />
            </svg>
            <button type="button" class="play" id="playPause" aria-label="재생">
              <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z" /></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="5" width="4" height="14" rx="1" /><rect x="14" y="5" width="4" height="14" rx="1" /></svg>
            </button>
          </div>

          <button type="button" class="step" id="nextSegment" aria-label="다음 구간">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l9-7z" /><rect x="17" y="5" width="2" height="14" rx="1" /></svg>
          </button>
        </div>

        <div class="meta">
          <div class="loopdots" id="loopDots" aria-label="이번 구간 반복 횟수"></div>
          <span class="segpos" id="segPos">0 / 0</span>
          <span class="timecode" id="timeRange">--:-- / --:--</span>
        </div>

        <div class="options">
          <div class="pace-group" id="paceGroup" role="group" aria-label="학습 모드">
            <span class="pace-label">학습</span>
            <button type="button" data-pace="fast">빠르게</button>
            <button type="button" class="is-active" data-pace="slow">천천히</button>
          </div>

          <div class="speed-group" aria-label="재생 속도">
            <span class="pace-label">속도</span>
            <button type="button" data-speed="0.5">0.5×</button>
            <button type="button" data-speed="0.75">0.75×</button>
            <button type="button" class="is-active" data-speed="1">1×</button>
            <button type="button" data-speed="1.25">1.25×</button>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>

    <aside class="sheet" id="segSheet" aria-label="구간 목록" aria-hidden="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <p class="label">구간</p>
        <span class="count" id="segmentCount">0개 구간</span>
      </div>
      <div class="segment-list" id="segmentList"></div>
    </aside>

    <aside class="sheet" id="notesSheet" aria-label="저장한 표현" aria-hidden="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <p class="label">저장한 표현</p>
        <span class="count" id="notesCount">0개</span>
      </div>
      <p class="notes-empty" id="notesEmpty" hidden>아직 저장한 구간이 없어요. 쉐도잉 중 ‘저장’을 눌러 보세요.</p>
      <div class="segment-list" id="notesList"></div>
    </aside>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
  </body>
</html>
